name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (bundle smoke)
        run: npm run build

  release:
    name: package · upload dmg to release
    needs: build
    # Only on version tags (e.g. v0.1.0). Build still validates every push/PR.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write # create the GitHub Release and upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync package version to tag
        # Make dmg filenames match the tag (e.g. v0.1.0 -> 0.1.0). Runner-only.
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build bundles
        run: npm run build

      - name: Package unsigned dmg (arm64 + x64)
        run: npx electron-builder --mac --publish never
        env:
          # No Apple certs in CI — build unsigned (matches electron-builder.yml).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload dmg to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Draft so a maintainer reviews before publishing an unsigned build.
          draft: true
          fail_on_unmatched_files: true
          files: release/*.dmg*
