name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (bundle smoke)
        run: npm run build

  package:
    name: package dmg artifact
    needs: build
    # Only on PRs — uploads the dmg as a build artifact named by PR number.
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      - name: Package unsigned dmg (arm64 + x64)
        run: npx electron-builder --mac --publish never
        env:
          # No Apple certs in CI — build unsigned (matches electron-builder.yml).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: tessera-dmg-pr${{ github.event.pull_request.number }}
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 14
