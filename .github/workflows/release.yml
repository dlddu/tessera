name: Release

# Publishes a signed + notarized macOS build to GitHub Releases on every push to
# an open PR (opened / synchronize / reopened) — no manual tag/merge needed.
#
# Version = <major>.<minor> from package.json + the workflow run number as the
# patch (e.g. 0.1.42). run_number is globally monotonic and unique per build, so
# every push yields a strictly-higher version that electron-updater offers to
# installed builds — unlike a per-PR number, which would collide across pushes of
# the same PR and break the update feed. Bump major/minor in package.json when
# you want those to move (the patch is always the run number). The originating PR
# is recorded in the release notes instead.
#
# WARNING: this publishes a live release from un-merged PR code, so every push to
# a PR ships that code to every user's auto-updater.
on:
  pull_request:

# electron-builder creates the GitHub Release + tag for the version.
permissions:
  contents: write

# Within one PR, a newer push cancels an in-flight release build so only the
# latest commit publishes.
concurrency:
  group: release-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Cheap gate: decide whether to release at all. Skips (rather than fails) when
  # signing secrets aren't configured yet, so PRs don't show a spurious red X and
  # we never publish an unsigned release. Also blocks forks (no secrets / untrusted
  # code must never reach the signed auto-update feed).
  gate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          if [ -n "${CSC_LINK:-}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing secrets (CSC_LINK) not configured — release skipped."
          fi

  release:
    name: build · sign · notarize · publish (arm64)
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    runs-on: macos-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      RUN_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the exact commit the PR author pushed (the PR head).
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive version from run number
        run: |
          BASE="$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")"
          VERSION="$BASE.$RUN_NUMBER"
          echo "Publishing version $VERSION (PR #$PR_NUMBER, run $RUN_NUMBER)"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build bundles
        run: npm run build

      - name: Build · sign · notarize · publish (arm64)
        run: npx electron-builder --mac --arm64 --publish always
        env:
          # Developer ID cert (base64 .p12) + its password — drives signing.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # notarytool credentials consumed by `mac.notarize: true`.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Lets electron-builder create/update the GitHub Release. Tags created
          # with GITHUB_TOKEN don't re-trigger workflows, so there's no recursion.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder skips BOTH signing and publishing for pull_request
          # builds by default (anti-fork-exfiltration). The gate job above already
          # restricts this workflow to same-repo PRs, so forcing both on is safe.
          CSC_FOR_PULL_REQUEST: 'true'
          PUBLISH_FOR_PULL_REQUEST: 'true'

      - name: Verify macOS native binaries are signed
        run: |
          found=0
          while IFS= read -r -d '' f; do
            # node-pty bundles prebuilt .node binaries for other platforms
            # (win32 / linux) that aren't Mach-O and can't be signed — skip them
            # so the check only asserts the macOS binaries are properly signed.
            if ! file -b "$f" | grep -q 'Mach-O'; then
              echo "Skipping non-Mach-O: $f"
              continue
            fi
            found=1
            echo "Verifying signature: $f"
            codesign --verify --strict --verbose=2 "$f"
          done < <(find release -name '*.node' -print0)
          if [ "$found" -eq 0 ]; then
            echo "::error::no Mach-O .node binaries found under release/ — check asarUnpack/packaging"
            exit 1
          fi

      - name: Record originating PR in release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          gh release edit "v$VERSION" --repo "$GITHUB_REPOSITORY" \
            --notes "Automated build from PR #$PR_NUMBER ($HEAD_REF @ ${HEAD_SHA:0:7})." \
            || echo "::warning::could not annotate release v$VERSION with PR info"
