# electron-builder packaging config.
# Bootstrap status: unsigned macOS dmg. Signing/notarization are placeholders —
# fill in once the product name, organization, and Apple Developer certs are confirmed.
appId: com.example.tessera
productName: Tessera

directories:
  output: release
  buildResources: build

# electron-vite emits bundles to ./out; package those + the manifest.
files:
  - out/**/*
  - package.json

# Rebuild native deps (node-pty) against Electron's ABI during packaging, and
# keep the native binding outside the asar archive so it can be dlopen'd at run
# time (a packed .node cannot be loaded from within asar).
npmRebuild: true
asarUnpack:
  - '**/node_modules/node-pty/**'

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
  # Unsigned build for bootstrap. Set `identity` + notarize once certs exist.
  identity: null
  # hardenedRuntime: true        # next step: enable with notarization
  # notarize: false              # next step: configure Apple notarization

dmg:
  title: ${productName}
