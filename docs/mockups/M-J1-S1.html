<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>M-J1-S1 · 새 워크스페이스 생성 (backend: host) — Tessera</title>
<link rel="stylesheet" href="../design-system/tessera.css">
</head><body>
<div class="shell">
  <div class="caption">
    <span class="cid">M-J1-S1</span>
    <span class="ctitle">새 워크스페이스 생성 (backend: host)</span>
    <span class="cmeta"><span><b>가치</b> V1·V2</span><span><b>AC</b> AC2.1</span><span><b>패턴</b> P-modal-over-quiet</span></span>
  </div>
  <div class="win ">
    <div class="titlebar">
      <div class="lights"><i></i><i></i><i></i></div>
      <div class="ws"><span class="muted">새 워크스페이스</span></div>
      <div class="right"><span class="badge host"><span class="led"></span>host</span></div>
    </div>
    <div class="surface"><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;color:var(--faint)"><span class="mark lg"><i></i><i></i><i></i><i></i></span><div style="font-size:13px;color:var(--muted)">아직 워크스페이스가 없습니다</div><div class="mono" style="font-size:11.5px">⌘N — 새 워크스페이스</div></div></div>
    <div class="statusbar"><div class="seg ws"><span class="mark"><i></i><i></i><i></i><i></i></span><span class="muted">워크스페이스 없음</span></div><div class="spacer"></div><div class="seg keys"><span><b>새 워크스페이스</b> <span class="kc">⌘</span><span class="kc">N</span></span></div><div class="clock">14:30</div></div>
    <div class="scrim"><div class="dialog">
  <div class="dhead"><span class="mark"><i></i><i></i><i></i><i></i></span><h3>새 워크스페이스</h3></div>
  <div class="dbody">
    <div class="field"><label>이름</label>
      <div class="input"><span>proj-web</span></div></div>
    <div class="field"><label>작업 디렉토리</label>
      <div class="input mono focus"><span class="ic">📁</span><span>~/proj-web</span><span class="pick">선택…</span></div></div>
    <div class="field"><label>Backend</label>
      <div class="segmented">
        <div class="seg on host"><span class="sdot"></span>호스트</div>
        <div class="seg cont"><span class="sdot"></span>컨테이너</div>
      </div>
      <div class="hint">호스트 머신에서 직접 실행됩니다. backend는 생성 후 고정됩니다.</div>
    </div>
  </div>
  <div class="dfoot"><div class="spacer"></div>
    <button class="btn ghost">취소</button>
    <button class="btn primary">워크스페이스 생성</button></div>
</div></div>
  </div>
</div>
</body></html>
